name: Build and Publish Wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual triggering from GitHub UI
  
jobs:
  build_wheels:
    name: Wheels · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up QEMU (Linux aarch64 cross-compile)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1

      - name: Upload wheel artefacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error
          
       
  build_sdist:
    name: Source Distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Verify utils.c is present in sdist
        run: |
          tar -tzf dist/*.tar.gz | grep 'utils.c' && echo "PASS: utils.c present in sdist" \
            || (echo "FAIL: utils.c missing from sdist" && exit 1)

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          
     
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi-release
    permissions:
      id-token: write

    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true 

      - name: List artefacts to be published
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
